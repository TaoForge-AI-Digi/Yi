appId: com.yi-lin.app
productName: "\u5F08"
copyright: "Copyright \u00A9 2024"

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*

extraResources:
  - from: resources/server
    to: server
    filter:
      - "**/*"
      - "!node_modules/**/*.{h,c,cpp,o,map}"
      - "!node_modules/**/test/**"
      - "!node_modules/**/tests/**"
      - "!node_modules/**/.cache/**"
  - from: resources/client
    to: client
  - from: resources/icon.png
    to: icon.png
  - from: resources/data
    to: data

asar: true
asarUnpack:
  - "node_modules/electron-updater/**"

win:
  target:
    - target: dir
      arch: [x64]
  icon: icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: icon.png

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: icon.png

publish:
  - provider: github
    owner: <your-github-username>
    repo: <your-repo-name>
    releaseType: release
  # - provider: generic
  #   url: https://your-oss.example.com/releases
  #   channel: latest
